<!-- COMUNIDAD MUJERES - PÁGINA DE PRUEBA -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad de Mujeres - Prueba</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .container-post {
            max-width: 600px;
            margin: 20px auto;
        }
        #feed {
            margin-top: 20px;
        }
        .post {
            animation: slideIn 0.3s ease-in;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .hidden {
            display: none !important;
        }
        .comment {
            background: #f8f9fa;
            padding: 8px;
            margin-top: 8px;
            border-left: 2px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">👩‍🌾 Comunidad de Mujeres Rurales</span>
            <span class="text-white" id="user-display">Usuario Demo</span>
        </div>
    </nav>

    <div class="container-post">
        <!-- CREAR PUBLICACIÓN -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Crear Publicación</h5>
                <textarea id="postContent" class="form-control mb-2" placeholder="¿Qué deseas compartir?..." rows="4"></textarea>
                
                <div class="mb-2">
                    <label for="postMedia" class="form-label">Imagen o Video:</label>
                    <input type="file" id="postMedia" class="form-control" accept="image/*,video/*">
                </div>

                <div id="mediaPreview" class="mb-2 hidden" style="max-width: 100%; border-radius: 6px; overflow: hidden;"></div>

                <button id="publicarBtn" class="btn btn-success w-100">📝 Publicar</button>
            </div>
        </div>

        <!-- FEED DE PUBLICACIONES -->
        <div id="feed"></div>
    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script src="src/js/comunidad-mujeres.js"></script>
    
    <script>
        // Mostrar usuario actual
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('cultivida_currentUser'));
            if (user) {
                document.getElementById('user-display').textContent = user.displayName || 'Usuario Demo';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
