        <!-- Navbar-->

        </ul>

    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                <div class="sb-sidenav-menu">
                    <div class="nav">

                        <div class="sb-sidenav-menu-heading">Profesional agrónomo</div>
                        <a class="nav-link" href="panel-profesional.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-comments"></i></div>
                            Chats con Agricultores
                        </a>

                            <div class="sb-nav-link-icon"><i class="fa-solid fa-calendar"></i></div>
                            Eventos

                            <div class="sb-nav-link-icon"><i class="fa-solid fa-thumbs-up"></i></div>
                            Comunidad
                        </a>
                        <a class="nav-link" href="info-pagos-prof.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                            Información pagos
                        </a>
                        <a class="nav-link" href="notif-prof.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-bell"></i></i></div>
                            Notificaciones
                        </a>
                    </div>
                </div>

            </nav>
        </div>

        <!-- LUGAR DONDE EDITAR NUEVO CONTENIDO -->
        <div id="layoutSidenav_content">
            <main class="container-fluid px-4 py-4">

                <h1 class="mt-4 mb-4 fw-bold">
                    <i class="fa-solid fa-file-invoice-dollar me-2"></i>
                    Configuración de Pagos
                </h1>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">

                        <!-- Activar pagos -->
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" id="activarPagos">
                            <label class="form-check-label fw-semibold" for="activarPagos">
                                Activar cobro por asesorías
                            </label>
                        </div>

                        <hr>

                        <!-- Cuenta destino -->
                        <h4 class="mt-3 mb-3 fw-semibold">
                            <i class="fa-solid fa-building-columns me-2"></i>
                            Cuenta de destino
                        </h4>

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Banco</label>
                                <input type="text" class="form-control" id="bancoDestino" placeholder="Ej: Bancolombia">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tipo de cuenta</label>
                                <select class="form-select" id="tipoCuentaDestino">
                                    <option value="">Seleccionar</option>
                                    <option value="Ahorros">Ahorros</option>
                                    <option value="Corriente">Corriente</option>
                                    <option value="Nequi">Nequi</option>
                                    <option value="Daviplata">Daviplata</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>

                            <div class="col-md-6 d-none" id="campoTipoCuentaOtro">
                                <label class="form-label">¿Cuál?</label>
                                <input type="text" class="form-control" id="tipoCuentaOtro"
                                    placeholder="Especificar tipo de cuenta">
                            </div>


                            <div class="col-md-6">
                                <label class="form-label">Número de cuenta</label>
                                <input type="text" class="form-control" id="numeroCuentaDestino"
                                    placeholder="Número de cuenta">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Titular</label>
                                <input type="text" class="form-control" id="titularCuentaDestino"
                                    placeholder="Nombre del titular">
                            </div>

                        </div>

                        <hr class="my-4">

                        <!-- Tarifas -->
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="fw-semibold mb-0">
                                <i class="fa-solid fa-tags me-2"></i>
                                Tarifas de asesorías
                            </h4>
                            <button class="btn btn-outline-success btn-sm" id="agregarTarifaBtn">
                                <i class="fa-solid fa-plus me-1"></i>
                                Agregar tarifa
                            </button>
                        </div>

                        <div id="listaTarifas" class="row g-3"></div>

                        <div class="text-end mt-4">
                            <button class="btn btn-primary px-4" id="guardarConfigPagosBtn">
                                <i class="fa-solid fa-floppy-disk me-2"></i>
                                Guardar configuración
                            </button>
                        </div>

                    </div>
                </div>

            </main>

        </div>
        <!-- FINAL DE EDITAR NUEVO CONTENIDO -->

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"

        <script type="module" src="src/js/auth-guard.js"></script>
        <script type="module" src="src/js/info-pagos-prof.js"></script>
        <script src="src/js/buscador-global.js"></script>

</body>

</html>
