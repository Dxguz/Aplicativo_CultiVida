<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Panel de administración Cultivida" />
    <meta name="author" content="Cultivida" />
    <title>Panel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="src/css/estilos-p-admin.css" rel="stylesheet" />
    <link href="src/css/estilos-cursos-admin.css" rel="stylesheet" />

    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

    <script type="module">
        import { auth } from '/src/js/firebase.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '/index.html';
            }
        });
    </script>
</head>

<body class="sb-nav-fixed" style="display: none;">
    <!-- Navbar superior -->
    <nav class="sb-topnav navbar navbar-expand navbar-dark">
        <a class="navbar-brand ps-3" href="index.html">Home</a>

        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>

        <form class="d-none d-md-inline-block form-inline ms-auto me-0 me-md-3 my-2 my-md-0">
            <div class="input-group">
                <input class="form-control" type="text" placeholder="Buscar..." aria-label="Search for..."
                    aria-describedby="btnNavbarSearch" />
                <button class="btn btn-primary" id="btnNavbarSearch" type="button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </form>

        <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle d-flex align-items-center justify-content-center" id="navbarDropdown"
                    href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">

                    <img id="navAdminPhoto" class="admin-avatar" alt="Avatar admin" />

                </a>

                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                    <li><a id="btnProfileConfig" class="dropdown-item" href="admin-panel.html">Configuración del
                            perfil</a></li>
                    <li>
                        <hr class="dropdown-divider" />
                    </li>
                    <li><a id="btnLogout" class="dropdown-item" href="index.html">Cerrar sesión</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <!-- Contenedor principal -->
    <div id="layoutSidenav">
        <!-- Sidebar -->
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">Opciones</div>

                        <a class="nav-link" href="eventos-admin.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-calendar"></i></div>
                            Añadir eventos
                        </a>

                        <a class="nav-link" href="control-comunidad-admin.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-comment-dots"></i></div>
                            Control comunidad
                        </a>

                        <a class="nav-link" href="crear-curso-mujeres-admin.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-person-dress"></i></div>
                            Crear cursos mujeres
                        </a>

                        <a class="nav-link" href="aprobacion-profesionales.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-thumbs-up"></i></div>
                            Aprobación profesionales
                        </a>

                        <a class="nav-link" href="pqrs-admin.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-list-check"></i></div>
                            Recepción PQRS
                        </a>
                        <a class="nav-link" href="reportes-msg-admin.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
                            Reportes mensajería
                        </a>
                    </div>
                </div>
            </nav>

        </div>
        <!-- Contenido principal -->
        <div id="layoutSidenav_content">
            <main>
                <div class="header-cursos">
                    <h1>Panel de Administración de Cursos</h1>
                    <button id="btnMostrarModal" class="btn-crear">Crear Curso</button>
                </div>
                <div id="modalCurso" class="modal oculto">
                    <div class="modal-content">
                        <span class="cerrar-modal">&times;</span>
                        <form id="formCrearCurso">
                            <div class="grupo-form">
                                <label>Nombre del curso</label>
                                <input type="text" id="nombreCurso" required>
                            </div>
                            <div class="grupo-form">
                                <label>Descripción</label>
                                <textarea id="descripcionCurso" rows="2" required></textarea>
                            </div>
                            <div class="grupo-form">
                                <label>Cupo</label>
                                <input type="number" id="cupoCurso" min="1" required>
                            </div>
                            <div class="grupo-form">
                                <label>Imagen del curso</label>
                                <input type="file" id="imagenCurso" accept="image/*">
                            </div>

                            <button type="button" id="btnAgregarModulo" class="btn-agregar-modulo">Agregar
                                Módulo</button>

                            <div id="contenedorModulos"></div>

                            <button type="submit" class="btn-principal">Guardar Curso</button>
                        </form>
                    </div>
                </div>


                <section id="mosaicoCursos">
                    <h2>Cursos Disponibles</h2>
                </section>
            </main>
        </div>

    </div>



    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script type="module" src="src/js/crear-curso-mujer-admin.js"></script>
    <script type="module" src="src/js/admin-panel.js"></script>
    <script type="module" src="src/js/admin-avatar.js"></script>
    <script type="module" src="src/js/auth-guard.js"></script>
    <script type="module" src="src/js/admin-logout.js"></script>


</body>
