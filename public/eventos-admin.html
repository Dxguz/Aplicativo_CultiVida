    <!-- LUGAR DONDE EDITAR EVENTOS -->
    <div id="layoutSidenav_content">
      <main class="container-fluid px-4 py-4">
        <div class="row g-4">
          <div class="col-12 col-xl-6">
            <div class="card p-3 shadow-sm">
              <h3 class="mb-3">Crear / Editar evento</h3>
              <form id="formEvento" autocomplete="off" novalidate>
                <input type="hidden" id="eventoId" value="">
                <div class="mb-3">
                  <label for="titulo" class="form-label">Título *</label>
                  <input id="titulo" class="form-control" type="text" required>
                </div>

                <div class="mb-3">
                  <label for="imagen" class="form-label">Imagen referente *</label>
                  <input id="imagen" class="form-control" type="file" accept="image/*" required>
                  <div class="mt-2">
                    <img id="eventImagePreview" src="src/img/default-event.png" alt="Vista previa"
                      style="max-width:220px; max-height:140px; object-fit:cover; display:block;">
                  </div>
                </div>

                <div class="row">
                  <div class="col-6 mb-3">
                    <label for="fecha" class="form-label">Fecha *</label>
                    <input id="fecha" class="form-control" type="date" required>
                  </div>
                  <div class="col-6 mb-3">
                    <label for="hora" class="form-label">Hora *</label>
                    <input id="hora" class="form-control" type="time" required>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="lugar" class="form-label">Lugar *</label>
                  <input id="lugar" class="form-control" type="text" required>
                </div>

                <div class="mb-3">
                  <label for="descripcion" class="form-label">Descripción *</label>
                  <textarea id="descripcion" class="form-control" rows="4" required></textarea>
                </div>

                <fieldset class="mb-3">
                  <legend class="form-label">Enviar a *</legend>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="todos" id="dest_todos">
                    <label class="form-check-label" for="dest_todos">Todos los usuarios</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="agricultor" id="dest_agricultor">
                    <label class="form-check-label" for="dest_agricultor">Agricultores</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="profesional" id="dest_profesional">
                    <label class="form-check-label" for="dest_profesional">Profesionales Agrónomos</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="mujer_rural" id="dest_mujer">
                    <label class="form-check-label" for="dest_mujer">Mujeres Rurales</label>
                  </div>
                </fieldset>

                <div class="d-flex gap-2">
                  <button id="btnGuardarEvento" class="btn btn-success" type="submit">Guardar evento</button>
                  <button id="btnCancelarEdicion" class="btn btn-secondary" type="button">Cancelar</button>
                </div>

                <div id="msgEvento" class="mt-3"></div>
              </form>
            </div>
          </div>

          <div class="col-12 col-xl-6">
            <div class="card p-3 shadow-sm">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <h3 class="m-0">Eventos creados</h3>
                <div>
                  <div class="btn-group" role="group" aria-label="filtros">
                    <button id="filterAll" class="btn btn-outline-primary btn-sm">Todos</button>
                    <button id="filterPast" class="btn btn-outline-secondary btn-sm">Pasados</button>
                    <button id="filterToday" class="btn btn-outline-info btn-sm">Hoy</button>
                    <button id="filterUpcoming" class="btn btn-outline-success btn-sm">Próximos</button>
                  </div>
                </div>
              </div>

              <div id="listaEventos" style="min-height:120px;">
                <!-- Los eventos se cargarán dinámicamente aquí -->
              </div>
            </div>
          </div>
        </div>

        <template id="templateEvento">
          <div class="evento mb-3 p-2 border rounded d-flex gap-3 align-items-center">
            <img class="evt-img" src="" alt="img" style="width:120px;height:80px;object-fit:cover;border-radius:6px;">
            <div class="flex-grow-1">
              <h5 class="evt-title mb-1"></h5>
              <div class="text-muted small evt-meta mb-1"></div>
              <p class="evt-desc mb-1" style="margin:0;"></p>
              <div class="mt-2">
                <button class="btn btn-sm btn-outline-success btn-interesa">Me interesa</button>
                <button class="btn btn-sm btn-outline-danger btn-no-interesa">No me interesa</button>
              </div>
            </div>
            <div class="d-flex flex-column gap-2">
              <button class="btn btn-sm btn-primary btn-editar">Editar</button>
              <button class="btn btn-sm btn-danger btn-eliminar">Eliminar</button>
            </div>
          </div>
        </template>

        <div class="modal fade" id="modalEliminarEvento" tabindex="-1">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Eliminar evento</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                ¿Estás seguro de que deseas eliminar este evento?
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="confirmarEliminarEvento" class="btn btn-danger">
                  Eliminar
                </button>
              </div>
            </div>
          </div>
        </div>


      </main>
    </div>

    <!-- FINAL DE EDITAR EVENTOS -->
