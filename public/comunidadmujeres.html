<body class="sb-nav-fixed" style="display: none;">

        <!-- Navbar Brand-->
        <a class="navbar-brand ps-3" href="index.html">Home</a>
        <!-- Sidebar Toggle-->
        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle" href="#!"><i
                class="fas fa-bars"></i></button>
        <!-- Navbar Search-->
        <form class="d-none d-md-inline-block form-inline ms-auto me-0 me-md-3 my-2 my-md-0">
            <div class="input-group">
                <input id="buscadorInput" class="form-control" type="text" placeholder="Buscar..." aria-label="Search for..."
                    aria-describedby="btnNavbarSearch" />
                <button class="btn btn-primary" id="btnNavbarSearch" type="button"><i
                        class="fas fa-search"></i></button>
            </div>
        </form>
        <!-- Navbar-->
        <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown"
                    aria-expanded="false"><i class="fas fa-user fa-fw"></i></a>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                    <li><a class="dropdown-item" href="#!">Configuración del perfil</a></li>
                    <li>
                        <hr class="dropdown-divider" />
                    </li>
                    <li><a class="dropdown-item" href="#!">Cerrar sesión</a></li>
                </ul>
            </li>
        </ul>
    </nav>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                <div class="sb-sidenav-menu">
                    <div class="nav">

                        <div class="sb-sidenav-menu-heading">Mujeres rurales</div>
                        <a class="nav-link" href="panel-mujeres.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-robot"></i></div>
                            ChatBot CultiVida
                        </a>

                        <a class="nav-link" href="cursos-mujeres.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-thumbs-up"></i></div>
                            Cursos
                        </a>

                        <a class="nav-link" href="eventos-p-mujeres.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-calendar"></i></div>
                            Eventos
                        </a>
                        <a class="nav-link" href="comunidadmujeres.html">
                            <div class="sb-nav-link-icon"> <i class="fa-solid fa-thumbs-up"></i></div>
                            Comunidad
                        </a>

                        <a class="nav-link" href="notif-mujeres.html">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-bell"></i></i></div>
                            Notificaciones
                        </a>
                    </div>
                </div>

            </nav>
        </div>

        <div id="layoutSidenav_content">
            <main class="container-fluid px-4 py-4">

                <h3 class="mb-3" id="communityTitle">Comunidad: Mujeres Rurales</h3>
                <p class="text-muted mb-4" id="userGreeting"></p>

                <div class="mb-4">
                    <button class="btn btn-primary" onclick="document.getElementById('postModal').style.display='flex'">
                        Crear publicación
                    </button>
                </div>
                <section id="feed" class="mx-auto" style="max-width: 700px;"></section>

                <div id="postModal" class="custom-modal-overlay" style="display:none;">
                    <div class="custom-modal-content">
                        <h3>Nueva Publicación</h3>
                        <textarea id="postModalContent" class="form-control mb-3"
                            placeholder="¿Qué quieres compartir hoy?" rows="4"></textarea>
                        <div id="previewContainer" class="mb-2 text-center"></div>

                        <div class="mb-3">
                            <label class="form-label fw-bold"><i class="fas fa-image"></i> Adjuntar foto o video</label>
                            <input type="file" id="postModalMedia" class="form-control" accept="image/*,video/*">
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-secondary"
                                onclick="document.getElementById('postModal').style.display='none'">Cancelar</button>
                            <button id="publishBtn" type="button" class="btn btn-primary px-4">Publicar</button>
                        </div>
                    </div>
                </div>
                <div id="customModal" class="custom-modal-overlay" style="display:none;">
                    <div class="custom-modal-content" style="max-width: 450px;">
                        <h3 id="modalTitle" class="mb-3">Título</h3>
                        <textarea id="modalInput" class="form-control mb-3" placeholder="Escribe aquí..."
                            rows="3"></textarea>
                        <div class="d-flex gap-2 justify-content-end">
                            <button class="btn btn-secondary"
                                onclick="document.getElementById('customModal').style.display='none'">Cancelar</button>
                            <button class="btn btn-success" id="modalConfirmBtn">Confirmar</button>
                        </div>
                    </div>
                </div>

                <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000;">
                    <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert"
                        aria-live="assertive" aria-atomic="true">
                        <div class="d-flex">
                            <div class="toast-body" id="toastMessage">¡Acción realizada!</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                                data-bs-dismiss="toast"></button>
                        </div>
                    </div>
                </div>

            </main>

            <footer class="py-4 bg-light mt-auto border-top">
                <div class="container-fluid px-4">
                    <div class="text-muted text-center small">Copyright &copy; CultiVida 2026</div>
                </div>
            </footer>
        </div>
    </div>

    <script type="module" src="src/js/notifications-agri-prof.js"></script>
    <script type="module" src="src/js/comunidad-mujeres.js"></script>
    <script type="module" src="src/js/navbar-profile.js"></script>
    <script type="module" src="src/js/auth-guard.js"></script>
    <script src="src/js/buscador-global.js"></script>
</body>

</html>
