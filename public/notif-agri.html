        <!-- LUGAR DONDE EDITAR NUEVO CONTENIDO -->
        <div id="layoutSidenav_content">
            <main>
                <section class="noti-section">

                    <!-- HEADER -->
                    <header class="noti-header">
                        <div class="noti-header-text">
                            <h2>Notificaciones</h2>
                            <p class="muted">
                                Aquí verás las notificaciones del sistema
                            </p>
                        </div>

                        <div class="noti-controls">
                            <select id="notiFilter">
                                <option value="all">Todas</option>
                                <option value="unread">No leídas</option>
                                <option value="read">Leídas</option>
                            </select>

                            <span class="counter" id="unreadCount">0</span>

                            <button class="btn-ghost" id="markAllRead">
                                Marcar todo como leído
                            </button>

                            <button class="btn-outline" id="clearAll">
                                Limpiar todo
                            </button>
                        </div>
                    </header>

                    <!-- LISTADO -->
                    <div class="noti-list-wrap">

                        <ul class="noti-list" id="notiList">
                            <!-- JS inserta aquí -->
                        </ul>

                        <!-- EMPTY -->
                        <div class="noti-empty" id="notiEmpty" hidden>
                            <div class="empty-icon">
                                <i class="fa-regular fa-bell"></i>
                            </div>
                            <strong>No hay notificaciones</strong>
                        </div>

                    </div>

                </section>
            </main>
        </div>
