<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrador | CultiVida</title>
  <link rel="stylesheet" href="src/css/admin-login.css">
  <script src="https://kit.fontawesome.com/a2d9d6c6d3.js" crossorigin="anonymous"></script>
</head>

<body>
  <header class="navbar">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <div class="login-container">
    <div class="login-box">
      <h1>Acceso Administrador</h1>
      <p class="subtitle">Ingrese sus credenciales para continuar</p>
      <form id="adminLoginForm">
        <div class="input-group">
          <label for="email"><i class="fa-solid fa-envelope"></i> Correo</label>
          <input type="email" id="email" placeholder="admin" required>
        </div>
        <div class="input-group">
          <label for="password"><i class="fa-solid fa-lock"></i> Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="loginBtn">Iniciar sesión</button>
      </form>
      <div id="loginMessage"></div>
    </div>
  </div>

  <script type="module" src="src/js/admin-login.js"></script>
</body>
</html>
