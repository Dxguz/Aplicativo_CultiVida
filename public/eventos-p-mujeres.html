                <div class="text-center mb-4">
                    <h2 class="fw-bold text-success">Eventos Disponibles</h2>
                    <div class="btn-group mt-3" role="group">

                        <button id="filterPast" class="btn btn-outline-success">Pasados</button>
                        <button id="filterToday" class="btn btn-outline-success">Hoy</button>

                </div>

                <template id="templateEventoUsuario">

                                </div>
                            </div>

                    </div>
